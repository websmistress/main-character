  <style>
    :root {
      --pink:     #F36396;
      --pink-bg:  #FFF5F9;
      --pink-dim: #FFD0E4;
      --blue:     #398DC2;
      --blue-dim: #C8E0F0;
      --blue-bg:  #F0F7FD;
      --bg:       #FFFFFF;
      --paper:    #FFFFFF;
      --sep:      #E8ECF4;
      --text:     #163457;
      --sub:      #4A6A8A;
      --dim:      #8AAAC0;
      --green:    #3D8A50;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* GATE */
    .gate { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .gate p { font-family:'Cinzel',serif; font-size:100px; font-weight:400; color:rgba(0,0,0,.05); }

    /* HEADER */
    .hdr {
      position:sticky; top:0; z-index:100;
      background: var(--pink);
      box-shadow: 0 2px 12px rgba(243,99,150,.3);
      padding: 0 28px;
    }
    .hdr-inner {
      display:flex; align-items:center; gap:20px;
      height:54px; max-width:860px; margin:0 auto;
    }
    .logo {
      font-family:'Cinzel', serif;
      font-size:16px; font-weight:500; letter-spacing:.1em;
      color:#FFF2B0; white-space:nowrap; flex-shrink:0;
      line-height:1; display:flex; align-items:center; gap:6px;
    }
    .hprog { flex:1; display:flex; align-items:center; gap:14px; }
    .hbar-wrap { flex:1; height:3px; background:rgba(255,255,255,.35); border-radius:2px; }
    .hbar { height:100%; background:#fff; border-radius:2px; transition:width .5s ease; }
    .hcount { font-size:11px; color:rgba(255,242,176,.7); white-space:nowrap; font-weight:400; }
    .hpct { font-family:'Inter',sans-serif; font-size:18px; font-weight:600; color:#FFF2B0; white-space:nowrap; }

    /* PILL */
    .pill {
      position:fixed; bottom:22px; right:22px; z-index:200;
      background:#fff; border:1px solid var(--sep);
      box-shadow:0 2px 12px rgba(0,0,0,.1);
      padding:7px 16px; font-size:11px; font-weight:400;
      color:var(--sub); border-radius:4px;
      opacity:0; transition:opacity .25s; pointer-events:none;
    }
    .pill.show { opacity:0; }
    .pill.ok  { color:var(--green); }
    .pill.err { color:#C04040; }

    /* CONTENT */
    .content { max-width:860px; margin:0 auto; padding:40px 20px 100px; }

    /* PAGE HEADER */
    .page-header { text-align:center; padding:24px 0 40px; }
    .page-logo {
      font-family:'Cinzel', serif;
      font-size:44px; font-weight:400;   /* 400 — не жирный */
      color: var(--blue);
      line-height:1.1; letter-spacing:.12em; text-transform:uppercase;
    }
    .page-logo span { display:block; font-size:44px; } /* тот же размер */
    .page-tagline {
      margin-top:16px; font-size:11px; font-weight:400;
      color:var(--blue); letter-spacing:.12em;
      text-transform:uppercase; opacity:.55;
    }
    .page-divider {
      display:flex; align-items:center; justify-content:center; gap:12px;
      margin:14px auto; max-width:260px;
    }
    .page-divider::before,.page-divider::after {
      content:''; flex:1; height:1px; background:var(--pink-dim);
    }
    .page-divider span { font-size:13px; color:var(--pink); }

    /* BLOCK CARD */
    .block {
      background: var(--paper);
      border-radius:3px;
      margin-bottom:8px;
      overflow:hidden;
      border:1px solid var(--sep);
      box-shadow:0 1px 3px rgba(22,52,87,.06), 0 4px 16px rgba(22,52,87,.05);
    }

    .block-head {
      display:grid; grid-template-columns:1fr auto; align-items:center; gap:16px;
      padding:18px 22px 16px 22px;
      cursor:pointer; user-select:none;
      background: var(--pink);
      transition:background .3s;
    }
    .block-head:hover { background:#F07AAF; }
    .block.all-done .block-head { background:#F9A8C7; }
    .block.all-done .block-head:hover { background:#F7B8D0; }

    .block-eyebrow { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .block-num {
      font-family:'Inter', sans-serif; font-size:10px; font-weight:600;
      color:#FFF2B0; letter-spacing:.12em; text-transform:uppercase;
    }
    .block-dates { font-size:10px; color:rgba(255,242,176,.65); letter-spacing:.02em; }

    .block-title {
      font-family:'Inter', sans-serif; font-size:17px; font-weight:500;
      color:#FFF2B0; line-height:1.25; margin-bottom:4px;
    }
    .block-sub { font-size:11px; color:rgba(255,242,176,.7); font-weight:300; margin-bottom:10px; }

    .badge {
      display:inline-block; font-family:'Inter',sans-serif;
      font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
      padding:3px 9px; border-radius:2px;
      background:rgba(255,255,255,.22); color:#FFF2B0; border:none;
    }
    .badge-upcoming,.badge-active,.badge-done,.badge-late {
      background:rgba(255,255,255,.22); color:#FFF2B0;
    }

    .block-right { text-align:right; display:flex; flex-direction:column; align-items:flex-end; }
    .block-pct {
      font-family:'Inter',sans-serif; font-size:28px; font-weight:300;
      color:#FFF2B0; line-height:1; letter-spacing:-.01em;
    }
    .block-cnt { font-size:10px; color:rgba(255,242,176,.6); margin-bottom:6px; font-weight:400; }

    .chevron { width:16px; height:16px; position:relative; margin-top:4px; }
    .chevron::before,.chevron::after {
      content:''; position:absolute;
      background:rgba(255,242,176,.7); width:7px; height:1px; top:7px; transition:transform .2s;
    }
    .chevron::before { left:1px; transform:rotate(45deg); }
    .chevron::after  { right:1px; transform:rotate(-45deg); }
    .block.open .chevron::before { transform:rotate(-45deg); }
    .block.open .chevron::after  { transform:rotate(45deg); }

    .block-bar { height:2px; background:rgba(255,255,255,.2); }
    .block-bar-fill { height:100%; background:rgba(255,242,176,.6); transition:width .4s ease; }

    /* TASKS — светло-розовая подложка, кремово-жёлтые строки */
    .tasks { list-style:none; display:none; background:var(--pink-dim); }
    .tasks.open { display:block; }

    .task { border-bottom:1px solid rgba(243,99,150,.2); }
    .task:last-child { border-bottom:none; }

    .task-row {
      display:flex; align-items:center;
      padding:0 22px; min-height:48px;
      background:#FFF2B0;
      transition:background .1s;
    }
    .task-row:hover { background:#FFECA0; }

    .task-check {
      position:relative; flex-shrink:0;
      width:32px; height:48px;
      display:flex; align-items:center; justify-content:center;
    }
    .task-check input {
      position:absolute; opacity:0; width:100%; height:100%;
      cursor:pointer; z-index:2; margin:0;
    }
    .cb {
      width:16px; height:16px;
      border:1px solid rgba(243,99,150,.4); border-radius:2px;
      background:transparent; transition:all .15s; position:relative;
    }
    .task-check input:checked ~ .cb { background:var(--pink); border-color:var(--pink); }
    .task-check input:checked ~ .cb::after {
      content:''; position:absolute; left:4px; top:1px;
      width:5px; height:9px;
      border:1.5px solid #fff; border-top:none; border-left:none;
      transform:rotate(45deg);
    }

    .task-name {
      flex:1; padding:0 0 0 10px;
      font-size:13px; font-weight:300; color:var(--pink); line-height:1.5;
    }
    .task.done .task-row  { background:var(--pink); }
    .task.done .task-row:hover { background:#F07AAF; }
    .task.done .task-name { color:#FFF2B0; }

    @media (max-width:600px) {
      .hdr { padding:0 16px; }
      .logo { font-size:13px; }
      .content { padding:24px 12px 80px; }
      .block-head { padding:14px 16px; }
      .block-title { font-size:16px; }
      .block-pct { font-size:24px; }
      .task-row { padding:0 16px; }
      .task-note { padding:6px 16px 12px 48px; }
      .page-logo { font-size:32px; }
      .page-logo span { font-size:32px; }
    }
  </style>
</head>

      {id:'b10t2',n:'Онлайн-тренинг — Как вести YouTube-канал'},
      {id:'b10t3',n:'Онлайн-тренинг — Стратегия продвижения YouTube-канала'},
      {id:'b10t4',n:'Онлайн-тренинг — Специфика рекламы на YouTube'},
      {id:'b10t5',n:'Онлайн-тренинг — Монетизация YouTube-канала'},
      {id:'b10t6',n:'Онлайн-тренинг — Как вести ТикТок и Shorts'},
      {id:'b10t7',n:'Онлайн-тренинг — Что выкладывать на разные площадки (специфика)'},
    ]
  },
  {
    id:'b11', num:11,
    title:'Телеграм-канал',
    sub:'Упаковка, продвижение, секреты ведения',
    from:'2026-08-31', to:'2026-09-06',
    tasks:[
      {id:'b11t1',n:'Онлайн-тренинг — Как вести Телеграм-канал'},
      {id:'b11t2',n:'Урок 96 — Как набирать аудиторию в Telegram, продавать и делать рекламу'},
      {id:'b11t3',n:'Урок 98 — Что выкладывать в Телеграм-канал, чтобы его постоянно читали?'},
      {id:'b11t4',n:'Урок 99 — Как писать посты?'},
      {id:'b11t5',n:'Урок 100 — Секреты вовлечения и создания тёплого сообщества в Telegram'},
      {id:'b11t6',n:'Урок 101 — Телеграм-канал инфлюенсера: как вести канал, чтобы к тебе приходили бренды?'},
      {id:'b11t7',n:'Урок 102 — Как продавать свои услуги и продукты в Telegram и использовать его для прогрева?'},
    ]
  },
];

/* ═══════════ STATE ═══════════ */
let prog = {};
let saveTimer = null;
const $ = id => document.getElementById(id);

function fmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${mo[d.getMonth()]}`;
}
function bStats(b) {
  const total = b.tasks.length;
  const done  = b.tasks.filter(t => prog[t.id]?.done).length;
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}
function totalStats() {
  let total=0, done=0;
  PROGRAM.forEach(b => b.tasks.forEach(t => { total++; if (prog[t.id]?.done) done++; }));
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}
function blockStatus(b) {
  const now=new Date(); now.setHours(0,0,0,0);
  const s=new Date(b.from+'T00:00:00'), e=new Date(b.to+'T00:00:00');
  if (bStats(b).pct===100) return 'done';
  if (now>=s && now<=e)    return 'active';
  if (now>e)               return 'late';
  return 'upcoming';
}

/* ═══════════ SYNC ═══════════ */
async function syncLoad() {
  try {
    const r = await fetch(KV_URL);
    if (r.ok) { const t=await r.text(); if (t) return JSON.parse(t); }
  } catch {}
  try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch { return {}; }
}
async function syncSave(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  try {
    await fetch(KV_URL,{method:'PUT',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)});
    return true;
  } catch { return false; }
}
function showPill(state, txt) {
  const el=$('pill');
  el.textContent=txt; el.className='pill show '+state;
  clearTimeout(el._t);
  if (state!=='saving') el._t=setTimeout(()=>el.classList.remove('show'),2500);
}
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    showPill('saving','○  Сохранение...');
    const ok=await syncSave(prog);
    showPill(ok?'ok':'err', ok?'✓  Сохранено':'✕  Только локально');
  },800);
}

/* ═══════════ RENDER ═══════════ */
function showGate() {
  $('root').innerHTML=`<div class="gate"><p>404</p></div>`;
}

function renderApp() {
  const s=totalStats();
  $('root').innerHTML=`
    <header class="hdr">
      <div class="hdr-inner">
        <div class="logo">Main Character ✦</div>
        <div class="hprog">
          <div class="hbar-wrap"><div class="hbar" id="hBar" style="width:${s.pct}%"></div></div>
          <div class="hpct" id="hPct">${s.pct}%</div>
        </div>
      </div>
    </header>
    <main class="content">
      <div class="page-header">
        <div class="page-logo">Blog<span>University</span></div>
        <div class="page-divider"><span>✦</span></div>
        <div class="page-tagline">22 июня — 6 сентября 2026 &nbsp;·&nbsp; 102 урока</div>
      </div>
      ${PROGRAM.map(renderBlock).join('')}
    </main>`;
  attachEvents();
  // авто-раскрыть активный блок
  const now=new Date(); now.setHours(0,0,0,0);
  PROGRAM.forEach(b=>{
    const s=new Date(b.from+'T00:00:00'), e=new Date(b.to+'T00:00:00');
    if (now>=s && now<=e) {
      $('blk-'+b.id)?.classList.add('open');
      $('tsk-'+b.id)?.classList.add('open');
    }
  });
}

function renderBlock(b) {
  const s=bStats(b), st=blockStatus(b);
  const lbl={upcoming:'Ожидается',active:'★ В процессе',done:'✓ Завершён',late:'! Не завершён'};
  return `
  <div class="block${s.pct===100?' all-done':''}" id="blk-${b.id}">
    <div class="block-head" onclick="toggleBlock('${b.id}')">
      <div>
        <div class="block-eyebrow">
          <span class="block-num">Блок ${b.num}</span>
          <span class="block-dates">${fmtDate(b.from)} — ${fmtDate(b.to)}</span>
        </div>
        <div class="block-title">${b.title}</div>
        <div class="block-sub">${b.sub}</div>
        <span class="badge badge-${st}">${lbl[st]}</span>
      </div>
      <div class="block-right">
        <div class="block-pct" id="pct-${b.id}">${s.pct}%</div>
        <div class="block-cnt" id="cnt-${b.id}">${s.done}&thinsp;/&thinsp;${s.total}</div>
        <div class="chevron"></div>
      </div>
    </div>
    <div class="block-bar"><div class="block-bar-fill" id="bar-${b.id}" style="width:${s.pct}%"></div></div>
    <ul class="tasks" id="tsk-${b.id}">
      ${b.tasks.map(renderTask).join('')}
    </ul>
  </div>`;
}

function renderTask(t) {
  const p=prog[t.id]||{};
  return `
  <li class="task${p.done?' done':''}" id="t-${t.id}">
    <div class="task-row">
      <label class="task-check">
        <input type="checkbox" data-id="${t.id}" ${p.done?'checked':''}>
        <div class="cb"></div>
      </label>
      <span class="task-name">${t.n}</span>
    </div>
  </li>`;
}

function toggleBlock(id) {
  $('blk-'+id).classList.toggle('open');
  $('tsk-'+id).classList.toggle('open');
}
function refreshBlock(bid) {
  const b=PROGRAM.find(x=>x.id===bid), s=bStats(b);
  $('bar-'+bid).style.width=s.pct+'%';
  $('pct-'+bid).textContent=s.pct+'%';
  $('cnt-'+bid).innerHTML=s.done+'&thinsp;/&thinsp;'+s.total;
  $('blk-'+bid).classList.toggle('all-done', s.pct===100);
}
function refreshTotal() {
  const s=totalStats();
  $('hBar').style.width=s.pct+'%';
  $('hPct').textContent=s.pct+'%';
}
function attachEvents() {
  document.querySelectorAll('.task-check input').forEach(cb=>{
    cb.addEventListener('change',e=>{
      const id=e.target.dataset.id;
      const bid=PROGRAM.find(b=>b.tasks.some(t=>t.id===id))?.id;
      if (!prog[id]) prog[id]={};
      prog[id].done=e.target.checked;
      $('t-'+id).classList.toggle('done',e.target.checked);
      refreshBlock(bid); refreshTotal(); scheduleSave();
    });
  });
}

/* ═══════════ INIT ═══════════ */
async function init() {
  const p=new URLSearchParams(location.search);
  if (p.get('t')!==TOKEN) { showGate(); return; }
  showPill('saving','○  Загрузка...');
  prog=await syncLoad();
  showPill('ok','✓  Готово');
  renderApp();
}
init();
</script>
</body>
